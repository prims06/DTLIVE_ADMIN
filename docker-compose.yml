services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtlive_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - storage_uploads:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: dtlive_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/u966142760_dtlive.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  storage_uploads:
  storage_logs:
